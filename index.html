<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GoSmart Tools Assets</title>

<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }

  body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
  }

  .container{
    max-width:700px;
    padding:40px;
  }

  h1{
    font-size:38px;
    margin-bottom:15px;
  }

  p{
    color:#cbd5e1;
    margin-bottom:30px;
    font-size:16px;
  }

  .btn{
    display:inline-block;
    padding:12px 28px;
    background:#4f46e5;
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    transition:0.3s ease;
    font-weight:600;
  }

  .btn:hover{
    background:#6366f1;
    transform:translateY(-3px);
  }

  footer{
    margin-top:40px;
    font-size:13px;
    color:#94a3b8;
  }
</style>

</head>
<body>

<div class="container">
  <h1>GoSmart Tools Assets</h1>
  <p>
    This repository contains static assets, images, scripts, and resources
    used across the GoSmart Tools ecosystem.
  </p>

  <a href="https://github.com/gosmarttools/gosmarttools-assets" class="btn">
    View Repository
  </a>

  <footer>
    © 2026 GoSmart Tools. All rights reserved.
  </footer>
</div>

</body>
</html>
